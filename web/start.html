<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>欢乐跳棋</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, var(--bg-page-gradient-start) 0%, var(--bg-page-gradient-mid) 50%, var(--bg-page-gradient-end) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .start-screen {
      text-align: center;
      padding: 40px;
    }
    .start-screen h1 {
      font-size: 48px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--title-gradient-start) 0%, var(--title-gradient-end) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .start-screen p {
      color: var(--text-muted);
      margin-bottom: 40px;
    }
    .mode-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 0;
    }
    .mode-tab {
      flex: 1;
      padding: 12px 24px;
      border: none;
      background: var(--tab-bg);
      color: var(--tab-text);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .mode-tab:first-child {
      border-radius: var(--radius) 0 0 0;
    }
    .mode-tab:last-child {
      border-radius: 0 var(--radius) 0 0;
    }
    .mode-tab.active {
      background: var(--tab-active-bg);
      color: var(--tab-active-text);
    }
    .setup-box {
      background: var(--bg-panel);
      padding: 30px 40px;
      border-radius: 0 0 15px 15px;
      display: inline-block;
      text-align: left;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }
    .setup-box h3 {
      margin-bottom: 20px;
      text-align: center;
      color: var(--text-main);
    }
    .setting {
      margin-bottom: 20px;
    }
    .setting label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .setting select,
    .setting input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-main);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .setting input {
      cursor: text;
    }
    .setting select:focus,
    .setting input:focus {
      outline: 2px solid var(--border-focus);
      border-color: transparent;
    }
    .setting select option:disabled {
      color: var(--text-muted);
      opacity: 0.5;
    }
    .setting-hint {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .btn-start {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      transition: transform 0.2s, background 0.2s;
      background: linear-gradient(135deg, var(--btn-primary-start) 0%, var(--btn-primary-end) 100%);
      color: #fff;
    }
    .btn-start:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }
    .btn-secondary {
      background: linear-gradient(135deg, var(--btn-secondary-start) 0%, var(--btn-secondary-end) 100%);
    }
    .btn-secondary:hover {
      opacity: 0.95;
    }
    .room-info {
      background: var(--room-bg);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      text-align: center;
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }
    .room-code {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 8px;
      color: var(--room-code-color);
      margin: 10px 0;
    }
    .player-list {
      margin-top: 10px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .waiting-text {
      color: var(--waiting-color);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .rules {
      margin-top: 30px;
      padding: 20px;
      background: var(--rules-bg);
      border-radius: 10px;
      font-size: 13px;
      color: var(--rules-text);
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }
    .rules h4 {
      color: var(--rules-title);
      margin-bottom: 10px;
    }
    .rules ul {
      padding-left: 20px;
    }
    .rules li {
      margin-bottom: 5px;
    }
    .hidden {
      display: none !important;
    }
    .error-msg {
      color: var(--error-color);
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      z-index: 100;
    }
    .theme-toggle:hover {
      transform: scale(1.1);
      box-shadow: var(--shadow-lg);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="切换主题">🌙</button>
  <div class="start-screen">
    <h1>🎮 欢乐跳棋</h1>
    <p>六角棋盘多人对弈</p>

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="local">单机模式</button>
      <button class="mode-tab" data-mode="online">联机模式</button>
    </div>

    <div class="setup-box">
      <div id="localSetup">
        <h3>单机设置</h3>

        <div class="setting">
          <label>👥 玩家数量</label>
          <select id="playerCount">
            <option value="1">1人 (自动补AI)</option>
            <option value="2" selected>2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
          </select>
        </div>

        <div class="setting">
          <label>🔺 每名玩家控制角区数</label>
          <select id="seatsPerPlayer">
            <option value="1">1个角区</option>
            <option value="2">2个角区</option>
            <option value="3" selected>3个角区</option>
          </select>
          <div id="setupHint" class="setting-hint"></div>
        </div>

        <div class="setting">
          <label>🤖 AI难度</label>
          <select id="aiDifficulty">
            <option value="easy">简单</option>
            <option value="medium" selected>中等</option>
            <option value="hard">困难</option>
          </select>
        </div>

        <button class="btn-start" id="startLocalBtn">开始游戏</button>
      </div>

      <div id="onlineSetup" class="hidden">
        <h3>联机设置</h3>

        <div class="setting">
          <label>👥 玩家数量</label>
          <select id="onlinePlayerCount">
            <option value="2" selected>2人</option>
            <option value="3">3人</option>
            <option value="4">4人</option>
            <option value="5">5人</option>
            <option value="6">6人</option>
          </select>
        </div>

        <div class="setting">
          <label>🔺 每名玩家控制角区数</label>
          <select id="onlineSeatsPerPlayer">
            <option value="1" selected>1个角区</option>
            <option value="2">2个角区</option>
            <option value="3">3个角区</option>
          </select>
          <div id="onlineSetupHint" class="setting-hint"></div>
        </div>

        <div id="roomCreation">
          <div class="setting">
            <label>我的名称</label>
            <input type="text" id="myNameInput" placeholder="选填，默认玩家1" maxlength="10" style="text-align: center;">
          </div>
          <button class="btn-start" id="createRoomBtn">创建房间</button>
        </div>

        <div id="roomDisplay" class="hidden">
          <div class="room-info">
            <div>房间号</div>
            <div class="room-code" id="roomCodeDisplay">------</div>
            <button class="copy-link-btn" id="copyLinkBtn" title="复制邀请链接">复制链接</button>
          </div>
          <div class="player-list" id="playerList">等待玩家加入...</div>
          <div class="waiting-text" id="waitingText">等待其他玩家加入...</div>
          <button class="btn-start" id="startOnlineBtn" disabled>开始游戏</button>
        </div>

        <div id="joinRoomSection" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
          <h4 style="text-align: center; margin-bottom: 15px; color: var(--text-muted);">或加入房间</h4>
          <div class="setting">
            <label>房间号</label>
            <input type="text" id="roomCodeInput" placeholder="输入6位房间号" maxlength="6" style="text-transform: uppercase; text-align: center; letter-spacing: 4px;">
          </div>
          <button class="btn-start" id="joinRoomBtn">加入房间</button>
        </div>

        <div id="onlineError" class="error-msg hidden"></div>
      </div>
    </div>

    <div class="rules">
      <h4>📖 游戏规则</h4>
      <ul>
        <li>玩家可以控制一个或多个角区，每个角区有10枚棋子</li>
        <li>每枚棋子的目标是进入自己起点的对角角区</li>
        <li>单步移动到相邻空格，或跳跃过相邻棋子到空格</li>
        <li>跳跃后可继续跳跃，也可以主动结束回合</li>
        <li>先完成全部棋子转移的玩家获胜</li>
      </ul>
    </div>
  </div>

  <div id="gameArea" class="game-page hidden">
    <main class="game-shell">
      <header class="game-header">
        <h1>欢乐跳棋</h1>
        <div class="header-actions">
          <button id="btnBGM" type="button">音乐</button>
          <button id="btnIds" type="button" hidden>格号</button>
          <button id="btnRestart" type="button">重新开始</button>
          <button id="btnBack" type="button">返回主页</button>
        </div>
      </header>

      <section id="statusBar" class="status-bar">
        <div id="playerInfo" class="player-info"></div>
        <div id="turnInfo" class="turn-info">
          <span id="turnMessage">初始化中...</span>
          <button id="btnEndJump" type="button" hidden>结束跳跃</button>
        </div>
      </section>

      <section class="board-wrap">
        <canvas id="board" width="700" height="700" aria-label="欢乐跳棋棋盘"></canvas>
      </section>
    </main>

    <div id="tooltip" class="tooltip"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="board_data.js"></script>
  <script src="js/messages.js"></script>
  <script src="js/network.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/player.js"></script>
  <script src="js/piece.js"></script>
  <script src="js/board.js"></script>
  <script src="js/ai.js"></script>
  <script>
    window.NO_AUTO_GAME_INIT = true;

    // Theme toggle
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      const btn = document.getElementById('themeToggle');
      if (btn) {
        btn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        btn.addEventListener('click', () => {
          const current = document.documentElement.getAttribute('data-theme');
          const next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          btn.textContent = next === 'dark' ? '☀️' : '🌙';
          // Update board colors
          if (window.game && window.game.board) {
            window.game.board.render(window.game.ctx, { showIds: window.game.showIds });
            window.game.render();
          }
        });
      }
    })();
  </script>
  <script src="js/game.js"></script>
  <script>
    let currentMode = 'local';
    let networkManager = null;
    let roomInfo = null;
    let webrtcOfferSent = new Set();

    (function() {
      const params = new URLSearchParams(window.location.search);
      const roomCode = params.get('room');
      if (roomCode) {
        const input = document.getElementById('roomCodeInput');
        if (input) {
          input.value = roomCode.toUpperCase();
          // Force switch to online mode without clicking tab
          document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
          const onlineTab = document.querySelector('[data-mode="online"]');
          if (onlineTab) onlineTab.classList.add('active');
          document.getElementById('localSetup').classList.add('hidden');
          document.getElementById('onlineSetup').classList.remove('hidden');
          setTimeout(() => {
            document.getElementById('joinRoomBtn').click();
          }, 300);
        }
      }
    })();

    const modeTabs = document.querySelectorAll('.mode-tab');
    modeTabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        modeTabs.forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');
        currentMode = tab.dataset.mode;

        document.getElementById('localSetup').classList.toggle('hidden', currentMode !== 'local');
        document.getElementById('onlineSetup').classList.toggle('hidden', currentMode !== 'online');
      });
    });

    (function() {
      const savedName = localStorage.getItem('playerName');
      const input = document.getElementById('myNameInput');
      if (savedName && input) input.value = savedName;
    })();

    document.getElementById('startLocalBtn').addEventListener('click', () => {
      const playerCount = document.getElementById('playerCount').value;
      const seatsPerPlayer = document.getElementById('seatsPerPlayer').value;
      const aiDifficulty = document.getElementById('aiDifficulty').value;

      sessionStorage.setItem('gameConfig', JSON.stringify({
        mode: 'local',
        playerCount,
        seatsPerPlayer,
        aiDifficulty
      }));

      window.location.href = 'game.html';
    });

    const playerCountSelect = document.getElementById('playerCount');
    const seatsPerPlayerSelect = document.getElementById('seatsPerPlayer');
    const setupHint = document.getElementById('setupHint');

    function getControllerCount() {
      const humans = Number(playerCountSelect.value);
      return humans === 1 ? 2 : humans;
    }

    function updateSeatOptions() {
      const controllerCount = getControllerCount();
      let bestEnabled = null;

      Array.from(seatsPerPlayerSelect.options).forEach((option) => {
        const seats = Number(option.value);
        const disabled = controllerCount * seats > 6;
        option.disabled = disabled;
        if (!disabled) bestEnabled = option.value;
      });

      if (seatsPerPlayerSelect.selectedOptions[0].disabled) {
        seatsPerPlayerSelect.value = bestEnabled || '1';
      }

      const seatsPerPlayer = Number(seatsPerPlayerSelect.value);
      const totalSeats = controllerCount * seatsPerPlayer;
      const aiText = Number(playerCountSelect.value) === 1 ? '，另有1名AI' : '';
      setupHint.textContent = `将创建 ${controllerCount} 名控制者${aiText}，共占用 ${totalSeats}/6 个角区。`;
    }

    playerCountSelect.addEventListener('change', updateSeatOptions);
    seatsPerPlayerSelect.addEventListener('change', updateSeatOptions);
    updateSeatOptions();

    const onlinePlayerCountSelect = document.getElementById('onlinePlayerCount');
    const onlineSeatsPerPlayerSelect = document.getElementById('onlineSeatsPerPlayer');
    const onlineSetupHint = document.getElementById('onlineSetupHint');

    function updateOnlineSeatOptions() {
      const controllerCount = Number(onlinePlayerCountSelect.value);
      let bestEnabled = null;

      Array.from(onlineSeatsPerPlayerSelect.options).forEach((option) => {
        const seats = Number(option.value);
        const disabled = controllerCount * seats > 6;
        option.disabled = disabled;
        if (!disabled) bestEnabled = option.value;
      });

      if (onlineSeatsPerPlayerSelect.selectedOptions[0].disabled) {
        onlineSeatsPerPlayerSelect.value = bestEnabled || '1';
      }

      const seatsPerPlayer = Number(onlineSeatsPerPlayerSelect.value);
      const totalSeats = controllerCount * seatsPerPlayer;
      onlineSetupHint.textContent = `共 ${controllerCount} 名玩家，占用 ${totalSeats}/6 个角区。`;
    }

    onlinePlayerCountSelect.addEventListener('change', updateOnlineSeatOptions);
    onlineSeatsPerPlayerSelect.addEventListener('change', updateOnlineSeatOptions);
    updateOnlineSeatOptions();

    document.getElementById('createRoomBtn').addEventListener('click', async () => {
      console.log('createRoomBtn clicked');
      hideError();

      networkManager = new NetworkManager({
        onRoomInfo: handleRoomInfo,
        onError: showOnlineError,
        onRoomStart: handleRoomStart,
        onDataChannelReady: handleDataChannelReady,
        onDisconnected: () => {
          console.log('network disconnected');
          showOnlineError('连接断开');
          resetOnlineUI();
        }
      });

      try {
        console.log('connecting to server...');
        const nameInput = document.getElementById('myNameInput');
        const name = nameInput ? nameInput.value.trim() : '';
        if (name) localStorage.setItem('playerName', name);
        
        await networkManager.connect();
        console.log('connected, creating room...');
        await networkManager.createRoom({
          playerCount: Number(onlinePlayerCountSelect.value),
          seatsPerPlayer: Number(onlineSeatsPerPlayerSelect.value),
          maxPlayers: Number(onlinePlayerCountSelect.value)
        });
        console.log('room created, setting up WebRTC...');
        await networkManager.setupWebRTC();
      } catch (error) {
        console.error('create room error:', error);
        showOnlineError('连接服务器失败: ' + error.message);
      }
    });

    document.getElementById('joinRoomBtn').addEventListener('click', async () => {
      hideError();
      const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();

      if (roomCode.length !== 6) {
        showOnlineError('请输入6位房间号');
        return;
      }

      networkManager = new NetworkManager({
        onRoomInfo: handleRoomInfo,
        onError: showOnlineError,
        onRoomStart: handleRoomStart,
        onDataChannelReady: handleDataChannelReady,
        onDisconnected: () => {
          showOnlineError('连接断开');
          resetOnlineUI();
        }
      });

      try {
        await networkManager.connect();
        await networkManager.joinRoom(roomCode);
        await networkManager.setupWebRTC();
      } catch (error) {
        showOnlineError('连接服务器失败: ' + error.message);
      }
    });

    function handleRoomInfo(info) {
      console.log('handleRoomInfo called:', info);
      roomInfo = info;
      document.getElementById('roomCodeDisplay').textContent = info.code;

      const playerCount = info.playerCount || 1;
      const maxPlayers = info.maxPlayers || 6;
      document.getElementById('playerList').textContent = `玩家: ${playerCount}/${maxPlayers}`;

      document.getElementById('roomCreation').classList.add('hidden');
      document.getElementById('joinRoomSection').classList.add('hidden');
      document.getElementById('roomDisplay').classList.remove('hidden');

      const copyBtn = document.getElementById('copyLinkBtn');
      copyBtn.style.display = '';
      copyBtn.style.visibility = 'visible';
      copyBtn.onclick = () => {
        const link = `${window.location.origin}/start.html?room=${info.code}`;
        const userAgent = navigator.userAgent.toLowerCase();
        const isAndroid = userAgent.includes('android');
        const isIOS = /iphone|ipad|ipod/.test(userAgent);

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link).then(() => {
            copyBtn.textContent = '已复制!';
            setTimeout(() => { copyBtn.textContent = '复制链接'; }, 2000);
          }).catch(() => {
            prompt('请长按复制链接：', link);
          });
        } else if (isAndroid || isIOS) {
          prompt('请长按复制链接：', link);
        } else {
          const range = document.createRange();
          const selection = window.getSelection();
          const tempSpan = document.createElement('span');
          tempSpan.textContent = link;
          tempSpan.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
          document.body.appendChild(tempSpan);
          range.selectNodeContents(tempSpan);
          selection.removeAllRanges();
          selection.addRange(range);
          try {
            document.execCommand('copy');
            copyBtn.textContent = '已复制!';
          } catch (e) {
            prompt('请手动复制链接：', link);
          }
          selection.removeAllRanges();
          document.body.removeChild(tempSpan);
          setTimeout(() => { copyBtn.textContent = '复制链接'; }, 2000);
        }
      };

      const isHost = info.hostId === networkManager.peerId;
      const startBtn = document.getElementById('startOnlineBtn');

      if (!isHost) {
        startBtn.hidden = true;
        document.getElementById('waitingText').textContent = '等待房主开始游戏...';
      } else if (info.status === 'full') {
        startBtn.disabled = true;
        document.getElementById('waitingText').textContent = '房间已满，连接中...';
      } else {
        startBtn.disabled = true;
        document.getElementById('waitingText').textContent = '等待其他玩家加入...';
      }

      if (isHost && info.clientIds) {
        info.clientIds.forEach((clientId) => {
          if (!webrtcOfferSent.has(clientId)) {
            webrtcOfferSent.add(clientId);
            networkManager.sendSDPOffer(clientId);
          }
        });
      }
    }

    function handleDataChannelReady() {
      console.log('handleDataChannelReady called, isHost=', roomInfo && roomInfo.hostId === networkManager.peerId);
      const isHost = roomInfo && roomInfo.hostId === networkManager.peerId;
      if (isHost && roomInfo && roomInfo.status === 'full') {
        const startBtn = document.getElementById('startOnlineBtn');
        startBtn.disabled = false;
        document.getElementById('waitingText').textContent = '连接已建立，可以开始游戏';
      }
    }

    function handleRoomStart() {
      try {
        console.log('handleRoomStart called, roomInfo=', roomInfo);
        const startScreen = document.querySelector('.start-screen');
        const gameArea = document.getElementById('gameArea');
        
        if (startScreen) startScreen.classList.add('hidden');
        if (gameArea) gameArea.classList.remove('hidden');
        
        if (!roomInfo) {
          console.error('handleRoomStart: roomInfo is null');
          return;
        }

        const isHost = roomInfo.hostId === networkManager.peerId;
        const cfg = roomInfo.config || {};

        console.log('Creating Game with config:', { mode: 'online', network: true, playerCount: cfg.playerCount, seatsPerPlayer: cfg.seatsPerPlayer, isHost });

        window.game = new Game({
          mode: 'online',
          network: true,
          playerCount: cfg.playerCount || 2,
          seatsPerPlayer: cfg.seatsPerPlayer || 1,
          isHost: isHost,
          roomCode: roomInfo.code,
          networkManager: networkManager
        });
      } catch (e) {
        console.error('handleRoomStart error:', e);
      }
    }

    document.getElementById('startOnlineBtn').addEventListener('click', () => {
      if (!networkManager || networkManager.mode !== 'host') return;
      if (!roomInfo) {
        console.error('startOnlineBtn clicked but roomInfo is null');
        return;
      }
      console.log('startOnlineBtn clicked, broadcasting ROOM_START');
      networkManager.broadcastToRoom(createMessage(NETWORK_MESSAGES.ROOM_START, {}));
      handleRoomStart();
    });

    function showOnlineError(msg) {
      const errorEl = document.getElementById('onlineError');
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('onlineError').classList.add('hidden');
    }

    function resetOnlineUI() {
      webrtcOfferSent.clear();
      document.getElementById('roomCreation').classList.remove('hidden');
      document.getElementById('joinRoomSection').classList.remove('hidden');
      document.getElementById('roomDisplay').classList.add('hidden');
    }

    document.getElementById('btnBack').addEventListener('click', () => {
      if (networkManager) {
        networkManager.disconnect();
        networkManager = null;
      }
      if (window.game) {
        window.game = null;
      }
      document.getElementById('gameArea').classList.add('hidden');
      document.querySelector('.start-screen').classList.remove('hidden');
      resetOnlineUI();
    });

    document.getElementById('btnRestart').addEventListener('click', () => {
      if (window.game) {
        window.game.startGame();
      }
    });

    document.getElementById('btnIds').addEventListener('click', () => {
      if (window.game) {
        window.game.showIds = !window.game.showIds;
        window.game.render();
      }
    });

    document.getElementById('btnEndJump').addEventListener('click', () => {
      if (window.game) {
        window.game.endJumpTurn();
      }
    });
  </script>
</body>
</html>
